{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tithe Management System{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #247ff7;
            --primary-dark: #1d4ed8;
            --success: #16a34a;
            --danger: #ef4444;
            --warning: #f59e0b;
            --ink: #0f172a;
            --text: #1f2937;
            --muted: #6b7280;
            --panel: #ffffff;
            --bg: #f8fafc;
            --border: #e5e7eb;
            --ring: rgba(36, 127, 247, 0.18);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ffffff;
            min-height: 100vh;
            color: var(--text);
        }

        /* Login Page Styles */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-box {
            background: #ffffff;
            border-radius: 8px;
            box-shadow: none;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 450px;
            padding: 32px;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: #dcfce7;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        .logo-icon svg {
            width: 45px;
            height: 45px;
            stroke: var(--primary);
        }

        h1 {
            font-size: 32px;
            color: var(--ink);
            margin-bottom: 8px;
            font-family: 'Space Grotesk', 'Plus Jakarta Sans', sans-serif;
        }

        .subtitle {
            color: var(--muted);
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
        }

        .input-icon svg {
            stroke: #94a3b8;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"],
        input[type="number"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 12px 12px 12px 45px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
            background: #ffffff;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--ring);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(22, 163, 74, 0.3);
        }

        .btn-secondary {
            background: #f1f5f9;
            color: #1f2937;
            border: 1px solid #e2e8f0;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .text-link {
            text-align: center;
            margin-top: 20px;
            color: var(--muted);
            font-size: 14px;
        }

        .text-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .text-link a:hover {
            color: var(--primary-dark);
        }

        /* Dashboard Styles */
        .dashboard {
            min-height: 100vh;
            background: #ffffff;
        }

        .header {
            background: #ffffff;
            border-bottom: 1px solid var(--border);
            padding: 20px 0;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            align-items: center;
        }

        .header-icon {
            width: 50px;
            height: 50px;
            margin-right: 15px;
        }

        .header-icon svg {
            stroke:#247ff7ff;
        }

        .header-title {
            font-size: 28px;
            color: var(--ink);
            margin-bottom: 4px;
            font-family: 'Space Grotesk', 'Plus Jakarta Sans', sans-serif;
        }

        .header-subtitle {
            font-size: 14px;
            color: var(--muted);
        }

        .btn-logout {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: transparent;
            border: none;
            color: #ef4444;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: background 0.3s;
        }

        .btn-logout:hover {
            background: #fef2f2;
        }

        .btn-logout svg {
            width: 20px;
            height: 20px;
            stroke: #ef4444;
        }

        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #ffffff;
            border-radius: 8px;
            padding: 20px;
            box-shadow: none;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-card.blue {
            border-left: 4px solid #3b82f6;
        }

        .stat-card.green {
            border-left: 4px solid var(--primary);
        }

        .stat-card.purple {
            border-left: 4px solid #9333ea;
        }

        .stat-info h3 {
            font-size: 14px;
            color: var(--muted);
            font-weight: 600;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 36px;
            color: var(--ink);
            font-weight: bold;
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-icon.blue {
            background: #dbeafe;
        }

        .stat-icon.green {
            background: #dcfce7;
        }

        .stat-icon.purple {
            background: #f3e8ff;
        }

        .stat-icon svg {
            width: 32px;
            height: 32px;
        }

        .stat-icon.blue svg {
            stroke: #3b82f6;
        }

        .stat-icon.green svg {
            stroke: var(--primary);
        }

        .stat-icon.purple svg {
            stroke: #9333ea;
        }

        /* Table Section */
        .table-section {
            background: #ffffff;
            border-radius: 8px;
            box-shadow: none;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .table-header {
            padding: 25px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .table-title {
            font-size: 22px;
            color: var(--ink);
            font-weight: bold;
            font-family: 'Space Grotesk', 'Plus Jakarta Sans', sans-serif;
        }

        .btn-add {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-add:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .btn-add svg {
            width: 20px;
            height: 20px;
            stroke: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #f9fafb;
        }

        th {
            padding: 16px 24px;
            text-align: left;
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 20px 24px;
            border-top: 1px solid var(--border);
            color: #4b5563;
        }

        tbody tr {
            transition: background 0.2s;
        }

        tbody tr:hover {
            background: #f9fafb;
        }

        .amount {
            color: var(--success);
            font-weight: 700;
            font-size: 16px;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            padding: 8px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-icon.edit {
            background: transparent;
            color: #3b82f6;
        }

        .btn-icon.edit:hover {
            background: #dbeafe;
        }

        .btn-icon.delete {
            background: transparent;
            color: #ef4444;
        }

        .btn-icon.delete:hover {
            background: #fee2e2;
        }

        .btn-icon svg {
            width: 18px;
            height: 18px;
        }

        /* Pagination */
        .pagination {
            padding: 20px 24px;
            border-top: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pagination-info {
            font-size: 14px;
            color: #6b7280;
        }

        .pagination-buttons {
            display: flex;
            gap: 10px;
        }

        .pagination-buttons button {
            padding: 8px;
            border: 2px solid #e5e7eb;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .pagination-buttons button:hover {
            background: #f9fafb;
        }

        .pagination-buttons svg {
            width: 20px;
            height: 20px;
            stroke: #6b7280;
        }

        /* Quote Section */
        .quote-section {
            margin-top: 30px;
            background: #ffffff;
            border-radius: 8px;
            padding: 32px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .quote-text {
            font-size: 18px;
            color: #374151;
            font-style: italic;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .quote-author {
            color: #6b7280;
            font-weight: 600;
            font-size: 16px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #ffffff;
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
            box-shadow: none;
            border: 1px solid var(--border);
        }

        .modal-header {
            padding: 25px;
            border-bottom: 1px solid #e5e7eb;
        }

        .modal-title {
            font-size: 22px;
            color: #1f2937;
            font-weight: bold;
        }

        .modal-body {
            padding: 25px;
        }

        .modal-footer {
            display: flex;
            gap: 12px;
            padding-top: 20px;
        }

        .btn-cancel {
            flex: 1;
            padding: 12px;
            border: 2px solid #e5e7eb;
            background: white;
            color: #374151;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-cancel:hover {
            background: #f9fafb;
        }

        .btn-submit {
            flex: 1;
            padding: 12px;
            border: none;
            background: var(--primary);
            color: white;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-submit:hover {
            background: var(--primary-dark);
        }

        /* Messages */
        .messages {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 2000;
            max-width: 400px;
        }

        .alert {
            padding: 16px 20px;
            border-radius: 8px;
            margin-bottom: 10px;
            box-shadow: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .alert-success {
            background: #dcfce7;
            color: #166534;
            border-left: 4px solid var(--success);
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border-left: 4px solid #ef4444;
        }

        .alert-warning {
            background: #fef3c7;
            color: #92400e;
            border-left: 4px solid #f59e0b;
        }

        /* Grid for register form */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .page-card {
            background: #ffffff;
            border-radius: 8px;
            box-shadow: none;
            border: 1px solid var(--border);
            padding: 28px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--ink);
            font-family: 'Space Grotesk', 'Plus Jakarta Sans', sans-serif;
        }

        .page-subtitle {
            color: var(--muted);
            font-size: 15px;
            margin-top: 6px;
        }

        .help-text {
            color: var(--muted);
            font-size: 13px;
            margin-top: 8px;
        }

        .form-stack > p {
            margin-bottom: 18px;
        }

        .form-stack label {
            font-weight: 600;
        }

        .form-stack input,
        .form-stack select,
        .form-stack textarea {
            margin-top: 6px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #9ca3af;
            font-weight: 600;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            background: #e0f2fe;
            color: #0369a1;
        }

        .table-container {
            width: 100%;
            overflow-x: auto;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }

            .header-content {
                flex-direction: column;
                gap: 15px;
            }

            .table-header {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            table {
                font-size: 14px;
            }

            th, td {
                padding: 12px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .page-card {
                padding: 24px;
            }

            .page-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    {% if messages %}
    <div class="messages">
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    {% block content %}{% endblock %}

    {% block scripts %}
    <script>
        function openModal() {
            document.getElementById('addTitheModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('addTitheModal').classList.remove('active');
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('addTitheModal');
            if (event.target == modal) {
                closeModal();
            }
        }

        // Auto-hide messages after 5 seconds
        setTimeout(function() {
            const alerts = document.querySelectorAll('.alert');
            alerts.forEach(function(alert) {
                alert.style.animation = 'slideOut 0.3s ease';
                setTimeout(function() {
                    alert.remove();
                }, 300);
            });
        }, 5000);
    </script>

    <style>
        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(400px);
                opacity: 0;
            }
        }
    </style>
    {% endblock %}
</body>
</html>
