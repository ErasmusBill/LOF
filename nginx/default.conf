server {
  1     listen 80;
  2     server_name fruitfulyouth.org www.fruitfulyouth.org;
  3
  4     client_max_body_size 20M;
  5
  6     location /static/ {
  7         alias /app/staticfiles/;
  8         access_log off;
  9         expires 30d;
 10         add_header Cache-Control "public, max-age=2592000";
 11     }
 12
 13     location /media/ {
 14         alias /app/media/;
 15         access_log off;
 16         expires 30d;
 17         add_header Cache-Control "public, max-age=2592000";
 18     }
 19
 20     location / {
 21         proxy_pass http://web:8000;
 22         proxy_set_header Host $host;
 23         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
 24         proxy_set_header X-Forwarded-Proto $scheme;
 25         proxy_redirect off;
 26     }
 27 }
